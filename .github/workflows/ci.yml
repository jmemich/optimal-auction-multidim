name: CI

on:
  push:
    branches: [master, ai-performance-refactor]
  pull_request:
    branches: [master, ai-performance-refactor]
  workflow_dispatch:

jobs:
  test:
    name: lint + type + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          # No committed uv.lock (library); key the cache off pyproject instead
          # of the default **/uv.lock glob, which would otherwise error.
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install project + dev deps
        run: uv sync --all-extras

      - name: Ruff lint
        run: uv run ruff check

      - name: Ruff format check
        run: uv run ruff format --check

      - name: Pyright type check
        run: uv run pyright
        continue-on-error: true  # informational; not a gate yet (tighten progressively)

      - name: Pytest
        run: uv run pytest  # gates: full suite incl. the 24-case baseline regression
